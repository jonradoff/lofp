server:
  port: 4993
  telnet_port: 4000
  ssh_port: 4022
  frontend_url: "http://localhost:4992"

mongodb:
  uri: "${MONGODB_URI:mongodb://localhost:27017}"
  database: "lofp"

game:
  scripts_dir: "${LOFP_SCRIPTS_DIR:../original/scripts}"
  config_file: "${LOFP_CONFIG_FILE:../original/scripts/LEGENDS.CFG}"
